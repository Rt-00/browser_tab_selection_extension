<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <title>Tab Selector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <div id="search-container">
      <span id="search-icon">⌕</span>
      <input
        id="search-input"
        type="text"
        placeholder="Buscar abas..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <div id="tab-list"></div>
    <div id="footer">
      <span><kbd>↑↓</kbd> <kbd>^N/P</kbd> navegar</span>
      <span><kbd>Enter</kbd> abrir</span>
      <span><kbd>Del</kbd> fechar aba</span>
      <span><kbd>Esc</kbd> fechar</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
